name: 🎯 CLAUDE L-NACIONAL — Picks Manual (Respaldo GitHub)

on:
  workflow_dispatch:
    inputs:
      lottery:
        description: 'Lotería'
        required: true
        type: choice
        options:
          - 'Gana Más'
          - 'Nacional Noche'
        default: 'Gana Más'
      sync_only:
        description: 'Solo sincronizar historial (no generar pick ni enviar Telegram)'
        required: false
        default: 'false'
        type: boolean
      no_telegram:
        description: 'Omitir Telegram'
        required: false
        default: 'false'
        type: boolean
      force:
        description: 'Forzar pick aunque ya exista uno hoy'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  sync-nacional-noche:
    if: inputs.lottery == 'Nacional Noche' && inputs.sync_only == 'true'
    runs-on: ubuntu-latest
    name: 🔄 Sync Nacional Noche (manual)

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔄 Pull últimos cambios
        run: |
          git config user.name  "CLAUDE L-NACIONAL Bot"
          git config user.email "bot@claude-l-nacional"
          git pull --rebase origin main

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🌙 Sincronizar historial Nacional Noche
        run: python sync_history.py --lottery "Nacional Noche"

      - name: 💾 Commit y push
        run: |
          git add data/history.xlsx
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "🔄 [Respaldo manual] Sync Nacional Noche — $(date +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i/3..."; sleep 5
          done

  gana-mas:
    if: inputs.lottery == 'Gana Más' && inputs.sync_only != 'true'
    runs-on: ubuntu-latest
    name: 🎯 Gana Más (manual)

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔄 Pull últimos cambios
        run: |
          git config user.name  "CLAUDE L-NACIONAL Bot"
          git config user.email "bot@claude-l-nacional"
          git pull --rebase origin main

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🎯 Verificar historial y generar picks Gana Más
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          NOTG=""
          FORCE=""
          if [ "${{ inputs.no_telegram }}" = "true" ]; then NOTG="--no-telegram"; fi
          if [ "${{ inputs.force }}" = "true" ]; then FORCE="--force"; fi
          python generate_picks.py --lottery "Gana Más" $NOTG $FORCE

      - name: 💾 Commit y push
        run: |
          git add data/history.xlsx data/picks_log.json data/performance.json data/picks_log.csv data/performance.csv
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "🎯 [Respaldo manual] Picks Gana Más — $(date +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i/3..."; sleep 5
          done

  sync-gana-mas:
    if: inputs.lottery == 'Gana Más' && inputs.sync_only == 'true'
    runs-on: ubuntu-latest
    name: 🔄 Sync Gana Más (manual)

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔄 Pull últimos cambios
        run: |
          git config user.name  "CLAUDE L-NACIONAL Bot"
          git config user.email "bot@claude-l-nacional"
          git pull --rebase origin main

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🎯 Sincronizar historial Gana Más
        run: python sync_history.py --lottery "Gana Más"

      - name: 💾 Commit y push
        run: |
          git add data/history.xlsx
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "🔄 [Respaldo manual] Sync Gana Más — $(date +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i/3..."; sleep 5
          done

  nacional-noche:
    if: inputs.lottery == 'Nacional Noche' && inputs.sync_only != 'true'
    runs-on: ubuntu-latest
    name: 🌙 Nacional Noche (manual)

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔄 Pull últimos cambios
        run: |
          git config user.name  "CLAUDE L-NACIONAL Bot"
          git config user.email "bot@claude-l-nacional"
          git pull --rebase origin main

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🌙 Verificar historial y generar picks Nacional Noche
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          NOTG=""
          FORCE=""
          if [ "${{ inputs.no_telegram }}" = "true" ]; then NOTG="--no-telegram"; fi
          if [ "${{ inputs.force }}" = "true" ]; then FORCE="--force"; fi
          python generate_picks.py --lottery "Nacional Noche" $NOTG $FORCE

      - name: 💾 Commit y push
        run: |
          git add data/history.xlsx data/picks_log.json data/performance.json data/picks_log.csv data/performance.csv
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "🌙 [Respaldo manual] Picks Nacional Noche — $(date +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i/3..."; sleep 5
          done
