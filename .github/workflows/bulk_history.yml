name: 📦 Carga Masiva de Historial

on:
  workflow_dispatch:
    inputs:
      csv_content:
        description: |
          Pega aquí el contenido del CSV (una fila por línea):
          fecha,loteria,p1,p2,p3
          2026-04-01,Gana Más,47,23,08
          2026-04-01,Nacional Noche,12,55,99
        required: true
        type: string
      dry_run:
        description: 'Dry run — solo validar sin guardar'
        required: false
        default: 'false'
        type: boolean
      no_telegram:
        description: 'Omitir mensaje de resumen en Telegram'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  bulk-load:
    runs-on: ubuntu-latest
    name: Cargar historial masivo

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 📝 Crear archivo CSV desde input
        run: |
          cat > /tmp/bulk_input.csv << 'CSVEOF'
          ${{ inputs.csv_content }}
          CSVEOF
          echo "CSV creado:"
          cat /tmp/bulk_input.csv

      - name: 📊 Procesar historial masivo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DRY=""
          NOTG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          if [ "${{ inputs.no_telegram }}" = "true" ]; then NOTG="--no-telegram"; fi
          python bulk_history.py --file /tmp/bulk_input.csv $DRY $NOTG

      - name: 💾 Commit historial actualizado
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "CLAUDE L-NACIONAL Bot"
          git config user.email "bot@claude-l-nacional"
          git add data/history.json data/performance.json
          git diff --staged --quiet || git commit -m "📦 Carga masiva — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
