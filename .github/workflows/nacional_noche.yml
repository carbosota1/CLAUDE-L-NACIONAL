name: 🌙 NACIONAL NOCHE — Picks Automáticos

on:
  schedule:
    # 12:00 PM RD (UTC-4) = 16:00 UTC
    - cron: '0 16 * * *'
    # 4:00 PM  RD (UTC-4) = 20:00 UTC
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      no_telegram:
        description: 'Omitir envío a Telegram'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    name: Generar picks Nacional Noche

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔄 Pull últimos cambios
        run: |
          git config user.name  "CLAUDE L-NACIONAL Bot"
          git config user.email "bot@claude-l-nacional"
          git pull --rebase origin main

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🌱 Inicializar historial si está vacío
        run: |
          python -c "
          import json
          from pathlib import Path
          f = Path('data/history.json')
          d = json.loads(f.read_text())
          entries = d.get('history', [])
          if not entries:
              print('Historial vacío, generando seed...')
              import subprocess
              subprocess.run(['python', 'seed_history.py'], check=True)
          else:
              print(f'Historial OK: {len(entries)} entradas')
          "

      - name: 🧠 Ejecutar análisis y generar picks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          EXTRA=""
          if [ "${{ inputs.no_telegram }}" = "true" ]; then
            EXTRA="--no-telegram"
          fi
          python generate_picks.py --lottery "Nacional Noche" $EXTRA

      - name: 💾 Commit y push con retry
        run: |
          git add data/picks_log.json data/performance.json
          if git diff --staged --quiet; then
            echo "Sin cambios que commitear"
            exit 0
          fi
          git commit -m "🌙 Picks Nacional Noche — $(date +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i/3..."
            sleep 5
          done
